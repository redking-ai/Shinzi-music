<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Shinzi Music</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #000; color: #fff; padding: 20px; padding-bottom: 150px; }
        h1 { font-size: 24px; margin-bottom: 24px; border-bottom: 1px solid #282828; padding-bottom: 10px; }
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .menu-item { display: flex; justify-content: space-between; padding: 16px; background-color: #121212; border-radius: 8px; text-decoration: none; color: #fff; font-weight: 500; }
        .menu-item:hover { background-color: #1a1a1a; }
        .icon-text { display: flex; align-items: center; gap: 12px; }
        .bottom-controls { position: fixed; bottom: 80px; left: 0; width: 100%; padding: 16px 20px; background: #000; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #282828; }
        .action-btn { width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; background-color: #121212; color: #fff; }
        .logout-btn { color: #ff4444; border: 1px solid #331111; }
        
        /* Mobile Navbar */
        .mobile-bottom-navbar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); border-top: 1px solid #282828; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-btn { color: #a7a7a7; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: #fff; }
    </style>
</head>
<body>
    <h1>Settings</h1>
    
    <div class="menu-list">
        <a href="account.html" class="menu-item"><div class="icon-text"><span>👤</span> Account</div> <span>></span></a>
        <a href="downloads.html" class="menu-item"><div class="icon-text"><span>⬇️</span> Downloads</div> <span>></span></a>
        <a href="history.html" class="menu-item"><div class="icon-text"><span>🕒</span> Play Historys</div> <span>></span></a>
        <a href="privacy.html" class="menu-item"><div class="icon-text"><span>🔒</span> Privacy</div> <span>></span></a>
        <a href="ai.html" class="menu-item"><div class="icon-text"><span>✨</span> AI Refferances <span style="font-size:10px; color:#1db954;">(Soon)</span></div> <span>></span></a>
        <a href="refer.html" class="menu-item"><div class="icon-text"><span>🎁</span> Reffer</div> <span>></span></a>
        <a href="additional.html" class="menu-item"><div class="icon-text"><span>⚙️</span> Additional Settings</div> <span>></span></a>
    </div>

    <div class="bottom-controls">
        <button class="action-btn logout-btn" id="btnLogout">Log ouT</button>
        <button class="action-btn">Switch accounT</button>
    </div>

    <nav class="mobile-bottom-navbar">
        <a href="index.html" class="nav-btn">🏠 Home</a>
        <a href="#" class="nav-btn">🔍 Search</a>
        <a href="#" class="nav-btn">📚 Library</a>
        <a href="settings.html" class="nav-btn active">⚙️ Settings</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "shinzi-music.firebaseapp.com",
            projectId: "shinzi-music",
            storageBucket: "shinzi-music.firebasestorage.app",
            messagingSenderId: "985596670426",
            appId: "1:985596670426:web:b52b69290533ae3dc450e3"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "continue.html"; });
        });
    </script>
</body>
</html>
