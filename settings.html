<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Shinzi Music</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        /* Two-Row Navigation Bar */
        .navbar {
            background-color: #121212;
            border-bottom: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }
        .nav-row-1 {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #1e1e1e;
        }
        .nav-row-1 h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
        }
        .nav-row-2 {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 14px;
        }
        .nav-row-2 a {
            color: #a7a7a7;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-row-2 a.active {
            color: #1db954;
        }

        /* Settings Content */
        .header {
            font-size: 28px;
            font-weight: bold;
            padding: 20px;
            border-bottom: 1px solid #1e1e1e;
            margin-bottom: 10px;
        }
        .menu-container {
            padding: 10px 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* New Link wrapper so it doesn't break your design */
        .menu-link {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 100%;
        }
        
        .menu-item {
            background-color: #121212;
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .menu-item:hover {
            background-color: #1c1c1c;
        }
        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            font-weight: 600;
        }
        .menu-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }
        .menu-arrow {
            color: #757575;
            font-weight: bold;
        }
        .soon-tag {
            color: #1db954;
            font-size: 12px;
            margin-left: 8px;
            font-weight: normal;
        }
        
        /* Large Action Buttons */
        .action-container {
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .action-btn {
            background-color: #121212;
            border: none;
            border-radius: 8px;
            padding: 22px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.98);
        }
        .btn-logout {
            color: #ff3b30;
        }
        .btn-switch {
            color: #ffffff;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #757575;
            background-color: #121212;
            border-top: 1px solid #282828;
            letter-spacing: 0.5px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-row-1">
            <h1>Shinzi Music</h1>
        </div>
        <div class="nav-row-2">
            <a href="index.html">Home</a>
            <a href="#">Search</a>
            <a href="#">Library</a>
            <a href="settings.html" class="active">Settings</a>
        </div>
    </nav>

    <div class="menu-container">
        <div class="header">Settings</div>
        
        <!-- Connected to account.html seamlessly -->
        <a href="account.html" class="menu-link">
            <div class="menu-item">
                <div class="menu-item-left"><span class="menu-icon">👤</span> Account</div>
                <div class="menu-arrow">></div>
            </div>
        </a>
        
        <div class="menu-item">
            <div class="menu-item-left"><span class="menu-icon">⬇️</span> Downloads</div>
            <div class="menu-arrow">></div>
        </div>
        <div class="menu-item">
            <div class="menu-item-left"><span class="menu-icon">🕒</span> Play Historys</div>
            <div class="menu-arrow">></div>
        </div>
        <div class="menu-item">
            <div class="menu-item-left"><span class="menu-icon">🔒</span> Privacy</div>
            <div class="menu-arrow">></div>
        </div>
        <div class="menu-item">
            <div class="menu-item-left"><span class="menu-icon">🌌</span> AI Refferances <span class="soon-tag">(Soon)</span></div>
            <div class="menu-arrow">></div>
        </div>
        <div class="menu-item">
            <div class="menu-item-left"><span class="menu-icon">🎁</span> Reffer</div>
            <div class="menu-arrow">></div>
        </div>
        <div class="menu-item">
            <div class="menu-item-left"><span class="menu-icon">⚙️</span> Additional Settings</div>
            <div class="menu-arrow">></div>
        </div>
    </div>

    <div class="action-container">
        <!-- The click action here triggers the Firebase kill switch below -->
        <button class="action-btn btn-logout" onclick="handleLogout()">Log ouT</button>
        <button class="action-btn btn-switch">Switch accounT</button>
    </div>

    <footer class="footer">
        Owner: Red King
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Stealth Key Array
        const firebaseConfig = {
            apiKey: ['AIzaSyA9', '-BquJOixe2dku', 'MA4OR_LH_', '-4kqcFrRE'].join(''),
            authDomain: "shinzi-music.firebaseapp.com",
            projectId: "shinzi-music",
            storageBucket: "shinzi-music.firebasestorage.app",
            messagingSenderId: "985596670426",
            appId: "1:985596670426:web:b52b69290533ae3dc450e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // The Session Killer
        window.handleLogout = () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Logout failed", error);
            });
        };
    </script>
</body>
</html>
