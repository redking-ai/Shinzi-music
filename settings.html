<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Settings - Shinzi Music</title>
    <style>
        :root {
            --bg-main: #000000;
            --bg-card: #121212;
            --text-main: #ffffff;
            --text-sub: #a7a7a7;
            --accent: #1db954; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 160px; overflow-x: hidden; }

        .settings-header { font-size: 32px; font-weight: 800; padding: 48px 16px 24px 16px; letter-spacing: -1px; }

        .menu-list { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; }
        
        .menu-item { 
            background: var(--bg-card); 
            padding: 16px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: var(--text-main); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 15px;
            transition: background 0.2s;
        }
        .menu-item:hover { background: #1a1a1a; }
        .menu-item-left { display: flex; align-items: center; gap: 16px; }
        
        .logout-btn { 
            background: #2a0e0e; 
            color: #ff4444; 
            text-align: center; 
            justify-content: center; 
            margin-top: 24px; 
            padding: 16px; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            display: block; 
            border: none; 
            width: 100%; 
            font-size: 16px; 
        }

        /* Persistent Bottom Player Console (Visual Match) */
        .playback-console-bar { 
            bottom: 70px; 
            height: 60px; 
            padding: 0 12px; 
            border-radius: 8px; 
            margin: 8px; 
            width: calc(100% - 16px); 
            background-color: rgba(30, 30, 30, 0.95); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8); 
            position: fixed; 
            left: 0; 
            right: 0; 
            z-index: 999; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .track-metadata-block { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .meta-left { display: flex; align-items: center; gap: 12px; }
        .meta-artwork-frame { width: 40px; height: 40px; background-color: #282828; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .meta-track-name { font-size: 14px; font-weight: 600; color: #fff; }
        .meta-artist-name { font-size: 12px; color: var(--text-sub); }
        .meta-right { display: flex; align-items: center; gap: 16px; color: #fff; }

        /* Proper Bottom Nav Bar */
        .mobile-bottom-navbar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); 
            border-top: 1px solid #282828; 
            display: flex; 
            justify-content: space-around; 
            z-index: 1000; 
            padding: 8px 0; 
        }
        .mobile-nav-btn { 
            background: none; 
            border: none; 
            color: var(--text-sub); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 4px; 
            font-size: 12px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: color 0.2s; 
            padding: 8px; 
            text-decoration: none; 
        }
        .mobile-nav-btn.active, .mobile-nav-btn:hover { color: var(--text-main); }

        @media (min-width: 769px) { 
            .mobile-bottom-navbar { display: none; } 
            .playback-console-bar { bottom: 0; margin: 0; width: 100%; border-radius: 0; }
        }
    </style>
</head>
