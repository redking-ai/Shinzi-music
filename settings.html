<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - Shinzi Music</title>
    <style>
        body {
            margin: 0;
            background-color: #090909;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Two-Row Navigation Bar */
        .navbar {
            background-color: #121212;
            border-bottom: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }
        .nav-row-1 {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #1e1e1e;
        }
        .nav-row-1 img {
            width: 40px;
            margin-right: 10px;
        }
        .nav-row-1 h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
        }
        .nav-row-2 {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 14px;
        }
        .nav-row-2 a {
            color: #a7a7a7;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-row-2 a:hover, .nav-row-2 a.active {
            color: #1db954;
        }

        /* Main Content */
        .container {
            flex: 1;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .profile-card {
            background-color: #121212;
            border-radius: 16px;
            padding: 35px 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            background-color: #1db954;
            color: #000000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            margin: 0 auto 20px auto;
            text-transform: uppercase;
        }
        .profile-email {
            font-size: 18px;
            font-weight: 500;
            color: #e0e0e0;
            margin-bottom: 30px;
        }

        /* Large Logout Button */
        .logout-btn {
            width: 100%;
            padding: 22px;
            background-color: #ff3b30;
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .logout-btn:active {
            transform: scale(0.97);
            background-color: #d32f2f;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #757575;
            background-color: #121212;
            border-top: 1px solid #282828;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Two-Row Navigation -->
    <nav class="navbar">
        <div class="nav-row-1">
            <img src="shinzimusic.png" alt="Shinzi Music">
            <h1>Shinzi Music</h1>
        </div>
        <div class="nav-row-2">
            <a href="index.html">Home</a>
            <a href="#">Search</a>
            <a href="#">Library</a>
            <a href="settings.html" class="active">Settings</a>
        </div>
    </nav>

    <div class="container">
        <h2>Account Settings</h2>
        
        <div class="profile-card">
            <div class="profile-avatar" id="userInitial">?</div>
            <!-- Dynamically loads real user email, no placeholder names -->
            <div class="profile-email" id="userEmail">Loading user data...</div>
            
            <button class="logout-btn" onclick="handleLogout()">LOG OUT</button>
        </div>
    </div>

    <footer class="footer">
        Owner: Red King
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Stealth Key to bypass GitHub bots
        const firebaseConfig = {
            apiKey: ['AIzaSyA9', '-BquJOixe2dku', 'MA4OR_LH_', '-4kqcFrRE'].join(''),
            authDomain: "shinzi-music.firebaseapp.com",
            projectId: "shinzi-music",
            storageBucket: "shinzi-music.firebasestorage.app",
            messagingSenderId: "985596670426",
            appId: "1:985596670426:web:b52b69290533ae3dc450e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Radar: Grabs the logged-in user's details to show on the screen
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const displayString = user.email || "User";
                document.getElementById('userEmail').innerText = displayString;
                document.getElementById('userInitial').innerText = displayString.charAt(0);
            } else {
                // If they aren't logged in, bounce them to login
                window.location.href = "login.html";
            }
        });

        // The True Session Killer
        window.handleLogout = () => {
            signOut(auth).then(() => {
                // Successfully killed the session, return to login safely
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Logout failed", error);
            });
        };
    </script>
</body>
</html>
