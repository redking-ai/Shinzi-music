<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Shinzi Music</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .auth-card { background: rgba(18, 18, 18, 0.9); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #282828; }
        .logo { width: 50px; border-radius: 50%; margin-bottom: 10px; }
        h1 { font-size: 22px; margin-bottom: 24px; }
        .input-field { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #444; background-color: #242424; color: #fff; font-size: 14px; outline: none; }
        .input-field:focus { border-color: #1db954; }
        .error-text { color: #ff4444; font-size: 12px; text-align: left; margin-top: -8px; margin-bottom: 12px; min-height: 15px; display: block; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #a7a7a7; margin-bottom: 20px; text-align: left; }
        .btn { width: 100%; padding: 14px; border-radius: 50px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-bottom: 12px; }
        .btn-primary { background-color: #1db954; color: #000; }
        .btn-google { background-color: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .divider { color: #a7a7a7; margin: 16px 0; font-size: 14px; position: relative; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="shinzimusic.png" alt="Logo" class="logo">
        <h1>Welcome to Shinzi Music</h1>
        
        <input type="email" id="signupEmail" class="input-field" placeholder="Email">
        <input type="password" id="signupPassword" class="input-field" placeholder="Password">
        <span id="passwordError" class="error-text"></span>

        <div class="checkbox-row">
            <input type="checkbox" id="termsCheck">
            <label for="termsCheck">By accepting Terms and Policy</label>
        </div>

        <button id="btnSignup" class="btn btn-primary">Sign UP</button>
        
        <div class="divider">OR</div>

        <button id="btnGoogleSignup" class="btn btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
        </button>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
