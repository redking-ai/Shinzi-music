<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Shinzi Music</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background-color: #121212;
            padding: 30px 24px;
            border-radius: 18px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            width: 70px;
            height: auto;
            margin-bottom: 15px;
        }
        h2 {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 24px 0;
        }
        .input-group {
            margin-bottom: 16px;
        }
        input {
            width: 100%;
            padding: 16px;
            background-color: #242424;
            border: 1px solid #242424;
            color: #ffffff;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #1db954;
        }
        input::placeholder {
            color: #757575;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin: 18px 4px;
            font-size: 13px;
            color: #b3b3b3;
            text-align: left;
        }
        .checkbox-container input {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }
        .action-btn {
            width: 100%;
            padding: 16px;
            background-color: #1db954;
            color: #000000;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 4px;
        }
        .action-btn:active {
            background-color: #1aa34a;
        }
        .switch-text {
            margin-top: 20px;
            font-size: 14px;
            color: #b3b3b3;
        }
        .switch-text a {
            color: #1db954;
            text-decoration: none;
            font-weight: bold;
        }
        .error {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="shinzimusic.png" alt="Shinzi Music" class="logo">
        <h2>Welcome to Shinzi Music</h2>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        
        <div class="checkbox-container">
            <input type="checkbox" id="terms" required>
            <label for="terms">By accepting Terms and Policy</label>
        </div>
        
        <button class="action-btn" onclick="handleSignup()">Sign UP</button>
        <div id="error-msg" class="error"></div>
        
        <div class="switch-text">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: ['AIzaSyA9', '-BquJOixe2dku', 'MA4OR_LH_', '-4kqcFrRE'].join(''),
            authDomain: "shinzi-music.firebaseapp.com",
            projectId: "shinzi-music"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleSignup = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const terms = document.getElementById('terms').checked;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = "none";

            if (!terms) {
                errorMsg.textContent = "You must accept the Terms and Policy.";
                errorMsg.style.display = "block";
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = "Password must be at least 6 characters.";
                errorMsg.style.display = "block";
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    if (error.code === 'auth/email-already-in-use') {
                        errorMsg.textContent = "This email is already in use.";
                    } else {
                        errorMsg.textContent = "Sign up failed. Try again.";
                    }
                    errorMsg.style.display = "block";
                });
        };
    </script>
</body>
</html>
