<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play History - Shinzi Music</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #121212;
            border-bottom: 1px solid #282828;
            padding: 15px;
            display: flex;
            align-items: center;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 20px;
            color: #1db954;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
        }
        .nav-title {
            margin: 0 auto;
            font-size: 20px;
            font-weight: 800;
        }

        /* History List */
        .history-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .history-item {
            background-color: #121212;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .song-info {
            display: flex;
            flex-direction: column;
        }
        .song-title {
            font-size: 16px;
            font-weight: 600;
        }
        .song-artist {
            font-size: 13px;
            color: #a7a7a7;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="settings.html" class="back-btn"><</a>
        <div class="nav-title">Play History</div>
    </nav>

    <div class="history-container">
        <div class="history-item">
            <div class="song-info">
                <span class="song-title">Recent Track Name</span>
                <span class="song-artist">Artist Name</span>
            </div>
        </div>
    </div>

</body>
</html>
